# ★★★ 2026-06-27 修改：强化技能名称约束，其他内容不变 ★★★
build_strategy_generation_prompt: |
  你是时序预测策略专家。生成2个候选预测策略。

  ─── 窗口特征 ───
  {{feat_desc}}

  ─── 预测轨迹（参考） ───
  {{traj_summary}}

  ─── 核心要求 ───
  • 每个策略必须完整覆盖 {{horizon}} 步预测区间。
  • 设策略包含阶段集合 stages = [stage₁, stage₂, ..., stageₙ]，
    其中 n 为动态阶段数，满足 3 ≤ n ≤ {{horizon}}。
  • 每个阶段 steps 为正整数，所有阶段步长之和必须严格等于：
    Σ(stage.steps) = {{horizon}}
  • stage 划分及各阶段 steps 应根据窗口特征、趋势稳定性、局部结构、
    周期特征和预测难度动态决定，不允许固定模式划分。

  ─── 阶段结构 ───
  每个 stage 必须符合以下结构：
  {"steps": <正整数>, "weights": {"<method_name>": <6位小数>, ...}}

  ─── 权重规则 ───
  • weights 是动态字典：
    - 可包含 2~N 个方法
    - 方法名称不固定
    - 不同阶段可使用不同方法集合
    - 不限制方法数量
    - 不限制方法名称
  • 每个 stage 的权重之和必须为 1.000000
  • 所有权重必须保留 6 位小数（如 0.723585、0.186715）
  • 禁止输出 0.6000000000 这种过长小数

  ─── ★★★★★ 可用技能列表（必须严格遵循） ★★★★★ ───
  ⚠️ 你只能使用以下列表中的技能名称，不得使用列表外的任何名称！
  ⚠️ 技能名称区分大小写，必须完全匹配！
  ⚠️ 如果你使用了列表之外的技能名称，该阶段将被判定为无效并丢弃！
  ⚠️ 每个阶段的 weights 中只能包含上述列表中的技能！

  【可用技能列表】（共 {{skill_count}} 个）：
  {{skill_list_formatted}}

  ─── JSON 输出格式（严格遵守） ───
  {
    "candidate_strategies": [
      {
        "name": "策略名称",
        "stages": [
          {"steps": <正整数>, "weights": {"<method_name_1>": <6位小数>, "<method_name_2>": <6位小数>}},
          ...
        ],
        "description": "策略描述"
      }
    ]
  }

  ─── ★★★★★ 输出规则（必须遵守） ★★★★★ ───
  [1] 只输出 JSON，不要包含任何解释、前缀、后缀、注释或 Markdown 标记。
  [2] 不要使用 ```json 或 ``` 等代码块标记。
  [3] 第一个字符必须是 `{`，最后一个字符必须是 `}`。
  [4] 所有键名必须用双引号包裹。
  [5] 所有字符串值必须用双引号包裹。
  [6] 不要包含尾随逗号。
  [7] 权重值保留 6 位小数，如 0.123456。
  [8] 如果不想包含 description 字段，可以省略。
  [9] ⚠️ 所有技能名称必须来自上面的【可用技能列表】！

  只输出 JSON，不要其他文字。

