# experiments/autotune/prompts.yaml
# 所有提示词模板固化在此，内容与旧版完全一致，仅优化了格式
# ★ ★ 2026-06-27 强化 build_strategy_generation_prompt 中的技能名称约束（其他内容不变）

build_prompt: |
  你是时间序列预测专家。请根据以下特征决定最佳预测方案，使用 1~5 个技能加权组合。

  序列特征：
  - 长度:{{data_len}}，季节强度:{{seas}}，趋势强度:{{trend}}，周期:{{period}}
  - 平稳性(ADF p-value):{{adf_pvalue}} (越小越平稳)
  - 差分后平稳性(1阶差分 ADF):{{diff_adf_pvalue}}
  - 缺失率:{{missing_rate}}
  - 近期波动比(最近5点/整体):{{recent_volatility}}
  - 局部斜率:{{local_slope}}，突变:{{change_detected}}
  - 自相关峰值 lag:{{acf_peak_lag}}，年自相关(365):{{acf_365}}
  - 样本熵(复杂度):{{sample_entropy}}，频谱熵:{{spectral_entropy}}
  - 主频(FFT峰值):{{fft_peak_freq}} (0~0.5，高频表示短期波动)
  - 近期5点均值:{{win_mean}}，波动:{{win_std}}，走势:{{win_trend}}
  - 最近10点: {{recent_str}}
  {{date_info}}
  {{rule_hint}}
  候选技能对比：
  {{skill_info}}
  {{error_hint}}{{season_hint}}{{calendar_hint}}{{precision_hint}}{{performance_hint}}
  {{long_hint}}

  要求：
  1. 输出 JSON 格式，包含以下字段：
     - "skill_weights": 技能名称到权重的字典，权重【小数且十位有效数字】，总和为1
     - "replan_interval": 整数 (1~5)
     - "reasoning": 简短的中文推理（20字以内）
     - "relation_to_reference": ★ 必须为 "completely_different"
  2. 权重示例：0.723676675, 0.1566867, 0.06568898（不要输出 0.6000000000）
  3. 输出示例：
     {
       "skill_weights": {"multi_resolution": 0.7235, "calendar": 0.1867, "naive": 0.0898},
       "replan_interval": 3,
       "reasoning": "长序列强季节，主用多分辨率",
       "relation_to_reference": "completely_different"
     }
  4. 不要输出任何解释。

build_preprocess_prompt: |
  你是时序数据预处理专家。请根据以下数据特征，选择最合适的预处理方法。

  数据特征：
  - 偏度 (Skewness): {{skewness}} (|>1| 表示严重偏斜，建议 Box-Cox)
  - 变异系数 (CV = std/mean): {{cv}} (>0.5 表示量级差异大，建议 Z-score)
  - 趋势强度: {{trend_strength}} (>0.6 建议线性去趋势)
  - 最小值: {{min_value}} (<=0 则不能使用 Box-Cox)
  - ADF p-value: {{adf_pvalue}} (>0.05 非平稳)

  可选预处理方法（只选一个）：
  1. identity_pre: 原始数据直接输入
  2. zscore_normalize: 标准化 (x-μ)/σ
  3. linear_detrend: 线性去趋势
  4. boxcox_transform: Box-Cox幂变换 (需数据全为正)

  输出 JSON 格式: {"preprocess": "方法名"}
  不要输出任何解释。

build_post_enhance_prompt: |
  你是时序预测后处理专家。当前主干模型已生成预测，请决定是否需要增强修正。

  残差诊断指标（基于验证集）：
  - 残差 lag-1 自相关: {{acf1}} (若 >0.3，说明残差有规律，建议启用残差修正)
  - 近期残差方差比 (最近10点/全部): {{var_ratio}} (若 >2.0，近期误差增大，建议启用)
  - 预测长度: {{horizon}} (若 >50，不建议长期残差外推)

  可选后处理增强（只选一个）：
  1. enhance_identity: 不做任何修正 (推荐用于残差为白噪声)
  2. residual_ar: AR(1)残差修正 (推荐用于残差有短期自相关)
  3. quantile_calibration: 分位数校准 (推荐用于存在系统偏差)

  输出 JSON 格式: {"enhance_skill": "增强方法名"}
  不要输出任何解释。

