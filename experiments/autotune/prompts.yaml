build_applicability_prompt: |
  你是一个策略评估专家。现有策略 {{policy_name}}，其语义描述为：{{semantic_desc}}。
  状态条件：{{state_condition}}，特征组：{{feature_groups}}，平均MASE：{{avg_mase}}。

  当前状态特征：{{features}}。

  请判断该策略是否适用于当前状态，并给出：
  1. 适用性判断（true/false）
  2. 置信度（0~1）
  3. 权重调整建议（相对值，范围 -0.2~0.2）
  4. 简要理由
  5. 若不适用，应避免什么操作
  6. 验证该策略是否有效的关键特征提示（不涉及具体数字）

  输出JSON格式：
  {
      "applicable": true/false,
      "confidence": 0.5,
      "suggested_weight_adjustment": 0.0,
      "reason": "简短理由",
      "do_not_use": "若不适用，说明原因",
      "verification_cue": "关键验证提示"
  }
  只输出JSON，不要解释。

build_merge_prompt: |
  你是一个策略合并决策专家。评估以下两条策略是否应该合并。

  策略A: {{policy_a_name}}（{{policy_a_desc}}）
    - 条件: {{policy_a_condition}}
    - 特征组: {{policy_a_groups}}
    - 平均MASE: {{policy_a_mase}}
    - 效用: {{policy_a_utility}}

  策略B: {{policy_b_name}}（{{policy_b_desc}}）
    - 条件: {{policy_b_condition}}
    - 特征组: {{policy_b_groups}}
    - 平均MASE: {{policy_b_mase}}
    - 效用: {{policy_b_utility}}

  当前状态摘要：{{state_summary}}

  请判断合并是否合理，给出：
  - should_merge: true/false
  - merge_score: 0~1 的合并得分
  - reason: 理由
  - new_condition: 合并后的新条件（若合并）
  - merged_strategy: 合并后的策略组合（若合并，可采用效果更好的策略结构）

  输出JSON格式，只输出JSON。

build_retire_prompt: |
  你是一个策略退休决策专家。评估以下策略是否应该被淘汰。

  策略: {{policy_name}}（{{policy_desc}}）
  - 状态: {{status}}
  - 平均MASE: {{avg_mase}}
  - 效用: {{utility}}
  - 激活次数: {{activation_count}}
  - 边际价值: {{marginal_value}}

  性能摘要：{{perf_summary}}

  请判断是否应该退休，并给出目标状态（DEPRECATED 或 ARCHIVE）及理由。
  输出JSON:
  {
      "should_retire": true/false,
      "confidence": 0.0~1.0,
      "target_status": "DEPRECATED" 或 "ARCHIVE",
      "reason": "理由"
  }

build_patch_prompt: |
  你是一个补丁决策专家。分析困难窗口是否适合打补丁。

  策略: {{policy_name}}
  困难窗口数: {{window_count}}
  窗口特征示例: {{window_sample}}
  当前状态: {{state_summary}}

  判断是否需要补丁，输出JSON:
  {
      "need_patch": true/false,
      "issue_type": "overestimation|underestimation|volatility_misread|trend_misread|seasonal_misread",
      "suggested_fix": {"field": "suggested_value"},
      "confidence": 0.0~1.0
  }

build_refresh_prompt: |
  你是一个策略刷新决策专家。评估策略是否应该刷新（更新embedding和条件）。

  策略: {{policy_name}}（{{policy_desc}}）
  漂移信息: {{drift_info}}

  输出JSON:
  {
      "should_refresh": true/false,
      "new_embedding_direction": [0.1, -0.05, ...],
      "new_condition_adjustments": {"feature": "new_operator value"},
      "confidence": 0.0~1.0,
      "reason": "理由"
  }