    target_column: "Sunspots"
    resolution_delay_days: 1
    volatility_window: 12
    templates:
      - id: sunspots_next_month
        type: "numerical"
        question_template: "预测下个月({date})的太阳黑子数"
        variables: ["date"]
        horizon: 1
        answer_extraction: "从文件读取{date}的Sunspots"
        difficulty: 3